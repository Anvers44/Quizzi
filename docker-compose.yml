services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "0.0.0.0:4000:4000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "4000"
      HOST: "0.0.0.0"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      - redis
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "0.0.0.0:5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  redis_data:
